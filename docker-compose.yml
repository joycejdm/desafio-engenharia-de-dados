version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: retize_postgres
    environment:
      POSTGRES_USER: retize_user
      POSTGRES_PASSWORD: retize_pass
      POSTGRES_DB: retize_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: